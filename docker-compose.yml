services:
  backend:
    build: ./backend
    container_name: credit-mgmt-backend
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/credit_mgmt.db
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev-secret-key-please-change}
    volumes:
      - ./data:/app/data
    ports:
      - "8000:8000"
    restart: unless-stopped
    networks:
      - app-network

  frontend:
    build: ./frontend
    container_name: credit-mgmt-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - app-network

  # Cloudflare Tunnel (可选，用于外部访问)
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: credit-mgmt-tunnel
    command: tunnel --config /etc/cloudflared/config.yml run
    volumes:
      - ./cloudflared:/etc/cloudflared
    depends_on:
      - frontend
    restart: unless-stopped
    networks:
      - app-network
    profiles:
      - cloudflare  # 使用 profile 控制是否启动

networks:
  app-network:
    driver: bridge
